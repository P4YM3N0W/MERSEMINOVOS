<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MeR Seminovos CRM</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Montserrat:wght@700;800;900&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#080808;
      --bg2:#111;
      --bg3:#181818;
      --bg4:#222;
      --brd:#2a2a2a;
      --txt:#f0f0f0;
      --sub:#9a9a9a;
      --mut:#5d5d5d;
      --ac:#ffb300;
      --ac2:#ff7a18;
      --ok:#22c55e;
      --warn:#f59e0b;
      --err:#ef4444;
      --r:12px;
      --sw:240px;
    }

    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;overflow:hidden}
    body{
      font-family:'Inter',sans-serif;
      background:var(--bg);
      color:var(--txt);
      display:flex;
    }

    button,input,select,textarea{
      font:inherit;
      outline:none;
    }

    button{
      cursor:pointer;
      border:none;
      background:none;
    }

    a{color:var(--ac);text-decoration:none}

    /* SIDEBAR */
    #sidebar{
      width:var(--sw);
      flex-shrink:0;
      background:var(--bg2);
      border-right:1px solid var(--brd);
      display:flex;
      flex-direction:column;
      overflow:hidden;
      transition:width .22s ease;
    }
    #sidebar.collapsed{width:60px}
    #sidebar.collapsed .hid{
      width:0;
      opacity:0;
      overflow:hidden;
      pointer-events:none;
    }

    .sb-h{
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:12px 11px;
      border-bottom:1px solid var(--brd);
      gap:8px;
      flex-shrink:0;
    }
    .sb-logo{
      display:flex;
      align-items:center;
      gap:9px;
      min-width:0;
    }
    .sb-logo img {
      width: 32px;
      height: 32px;
      object-fit: contain;
      flex-shrink: 0;
    }
    .sb-brand{
      display:flex;
      flex-direction:column;
      line-height:1.1;
      white-space:nowrap;
      transition:.2s;
    }
    .bn{
      font-family:'Montserrat',sans-serif;
      font-size:16px;
      font-weight:900;
      color:var(--txt);
    }
    .bs{
      font-size:9px;
      font-weight:800;
      color:var(--ac);
      text-transform:uppercase;
      letter-spacing:1.5px;
    }
    #sidebar.collapsed .sb-logo img {
      width: 36px;
      height: 36px;
    }
    #btnToggle{
      width:26px;
      height:26px;
      border-radius:7px;
      background:var(--bg3);
      border:1px solid var(--brd);
      color:var(--sub);
      font-size:16px;
      display:flex;
      align-items:center;
      justify-content:center;
      flex-shrink:0;
      transition:.2s;
    }
    #btnToggle:hover{border-color:var(--ac);color:var(--ac)}

    .sb-nav{
      flex:1;
      padding:9px 7px;
      display:flex;
      flex-direction:column;
      gap:3px;
      overflow-y:auto;
    }

    .nb{
      display:flex;
      align-items:center;
      gap:10px;
      width:100%;
      padding:11px 10px;
      border-radius:10px;
      color:var(--mut);
      text-align:left;
      transition:.2s;
      white-space:nowrap;
    }
    .nb:hover{background:var(--bg3);color:var(--txt)}
    .nb.on{background:rgba(255,179,0,.1);color:var(--ac)}

    .sb-ac{
      border-top:1px solid var(--brd);
      padding:9px 7px;
      display:flex;
      flex-direction:column;
      gap:4px;
    }
    .lbl{
      font-size:10px;
      color:var(--mut);
      text-transform:uppercase;
      letter-spacing:1px;
      padding:3px 5px;
      white-space:nowrap;
      transition:.2s;
    }
    .ab{
      display:flex;
      align-items:center;
      gap:9px;
      width:100%;
      padding:10px 10px;
      border-radius:10px;
      background:var(--bg3);
      border:1px solid var(--brd);
      color:var(--sub);
      transition:.2s;
      white-space:nowrap;
    }
    .ab:hover{border-color:var(--ac);color:var(--ac)}
    .sb-ft{
      border-top:1px solid var(--brd);
      padding:13px 11px;
      display:flex;
      flex-direction:column;
      gap:2px;
    }
    .sb-ft span{
      font-family:'Montserrat',sans-serif;
      font-size:12px;
      font-weight:900;
      color:var(--ac);
      white-space:nowrap;
      transition:.2s;
    }
    .sb-ft small{
      font-size:10px;
      color:var(--mut);
      white-space:nowrap;
      transition:.2s;
    }

    /* MAIN */
    #main{
      flex:1;
      display:flex;
      flex-direction:column;
      min-width:0;
      overflow:hidden;
    }

    #topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:14px;
      padding:15px 20px;
      border-bottom:1px solid var(--brd);
      background:#0d0d0d;
      flex-shrink:0;
    }

    #pgTitle{
      font-family:'Montserrat',sans-serif;
      font-size:25px;
      font-weight:900;
      letter-spacing:-.4px;
    }

    .tb-r{
      display:flex;
      align-items:center;
      gap:9px;
    }

    .sbox{
      display:flex;
      align-items:center;
      gap:7px;
      padding:9px 12px;
      background:var(--bg3);
      border:1px solid var(--brd);
      border-radius:11px;
    }
    .sbox input{
      background:transparent;
      border:none;
      color:var(--txt);
      width:260px;
    }
    .sbox input::placeholder{color:var(--mut)}

    /* BUTTONS */
    .bac{
      padding:10px 16px;
      border-radius:11px;
      font-weight:700;
      background:linear-gradient(135deg,var(--ac),var(--ac2));
      color:#111;
      transition:.2s;
    }
    .bac:hover{filter:brightness(1.08)}

    .bgh{
      padding:9px 14px;
      border-radius:10px;
      font-weight:600;
      background:var(--bg3);
      border:1px solid var(--brd);
      color:var(--txt);
      transition:.2s;
    }
    .bgh:hover{border-color:var(--ac);color:var(--ac)}

    .bdn{
      padding:9px 14px;
      border-radius:10px;
      font-weight:600;
      background:rgba(239,68,68,.08);
      border:1px solid rgba(239,68,68,.25);
      color:var(--err);
      transition:.2s;
    }
    .bdn:hover{background:rgba(239,68,68,.15)}

    .bsm{
      width:30px;
      height:30px;
      border-radius:8px;
      display:flex;
      align-items:center;
      justify-content:center;
      background:var(--bg3);
      border:1px solid var(--brd);
      color:var(--sub);
      transition:.2s;
      flex-shrink:0;
    }
    .bsm:hover{border-color:var(--ac);color:var(--ac)}

    .bx{
      color:var(--sub);
      font-size:20px;
      transition:.2s;
      width:30px;
      height:30px;
      border-radius:8px;
      display:flex;
      align-items:center;
      justify-content:center;
    }
    .bx:hover{background:var(--bg3);color:var(--txt)}

    .tv{
      width:34px;
      height:34px;
      border-radius:9px;
      display:flex;
      align-items:center;
      justify-content:center;
      background:var(--bg3);
      border:1px solid var(--brd);
      color:var(--sub);
      transition:.2s;
    }
    .tv.on{background:rgba(255,179,0,.1);border-color:rgba(255,179,0,.3);color:var(--ac)}

    /* VIEWS */
    .view{
      display:none;
      flex:1;
      overflow-y:auto;
      padding:18px 20px 40px;
    }
    .view.on{display:block}

    /* STATS */
    .stats-g{
      display:grid;
      grid-template-columns:repeat(5,1fr);
      gap:11px;
      margin-bottom:18px;
    }
    .sc{
      background:var(--bg2);
      border:1px solid var(--brd);
      border-top:3px solid transparent;
      border-radius:var(--r);
      padding:15px;
    }
    .sc-v{
      font-size:30px;
      font-weight:900;
      line-height:1;
      margin-bottom:5px;
    }
    .sc-l{
      font-size:11px;
      color:var(--sub);
      text-transform:uppercase;
      letter-spacing:.7px;
      font-weight:700;
    }

    /* DASH */
    .dash-c{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:13px;
    }
    .card{
      background:var(--bg2);
      border:1px solid var(--brd);
      border-radius:var(--r);
      overflow:hidden;
    }
    .card-h{
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:13px 15px;
      border-bottom:1px solid var(--brd);
    }
    .card-h span{
      font-size:12px;
      font-weight:700;
      text-transform:uppercase;
      letter-spacing:.6px;
      color:var(--sub);
    }
    .bdg{
      background:rgba(255,179,0,.1);
      color:var(--ac);
      border-radius:20px;
      padding:2px 10px;
      font-size:12px;
      font-weight:800;
    }

    .ai{
      display:flex;
      align-items:center;
      gap:10px;
      padding:11px 15px;
      border-bottom:1px solid var(--brd);
      cursor:pointer;
      transition:.15s;
    }
    .ai:last-child{border-bottom:none}
    .ai:hover{background:var(--bg3)}
    .ai-d{
      width:9px;height:9px;border-radius:50%;flex-shrink:0;
    }
    .ai-ico{
      width:32px;height:32px;border-radius:8px;
      background:rgba(255,179,0,.07);
      border:1px solid rgba(255,179,0,.14);
      display:flex;align-items:center;justify-content:center;
      color:var(--ac);flex-shrink:0;
    }
    .ai-ico img{
      width:100%;height:100%;object-fit:cover;border-radius:7px;
    }
    .ai-inf{
      flex:1;min-width:0;
    }
    .ai-inf strong{
      display:block;
      font-size:13px;
      font-weight:600;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .ai-inf small{
      color:var(--sub);
      font-size:11px;
    }
    .ai-tg{
      padding:3px 9px;
      border-radius:20px;
      font-size:11px;
      font-weight:700;
      white-space:nowrap;
    }

    /* TOOLBAR */
    .tlb{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      margin-bottom:15px;
    }
    .flt{
      display:flex;
      gap:8px;
    }
    .flt select{
      padding:9px 12px;
      background:var(--bg3);
      border:1px solid var(--brd);
      border-radius:10px;
      color:var(--txt);
    }
    .tvg{display:flex;gap:5px}

    /* GRADE / LISTA */
    .grade{
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(275px,1fr));
      gap:13px;
    }
    .grade.ls{grid-template-columns:1fr}
    
    .vc{
      background:var(--bg2);
      border:1px solid var(--brd);
      border-radius:var(--r);
      padding:15px;
      cursor:pointer;
      transition:.18s;
      display:flex;
      flex-direction:column;
      position: relative;
    }
    .vc:hover{
      border-color:rgba(255,179,0,.3);
      transform:translateY(-1px);
      box-shadow:0 8px 22px rgba(0,0,0,.28);
    }
    .grade.ls .vc {
      flex-direction: row;
      align-items: center;
      gap: 15px;
      padding: 12px 15px;
    }

    .vc-check-wrap {
      display: none;
      align-items: center;
      justify-content: center;
      margin-right: 5px;
    }
    .grade.ls .vc-check-wrap {
      display: flex;
    }
    .vc-check-wrap input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: var(--ac);
      cursor: pointer;
    }

    .vc-body-content {
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    .grade.ls .vc-body-content {
      flex-direction: row;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      gap: 20px;
    }

    .vc-tp{
      display:flex;
      align-items:flex-start;
      gap:11px;
      margin-bottom:11px;
    }
    .grade.ls .vc-tp {
      margin-bottom: 0;
      width: 25%;
      flex-shrink: 0;
    }

    .vc-ico{
      width:40px;height:40px;border-radius:10px;
      background:rgba(255,179,0,.07);
      border:1px solid rgba(255,179,0,.14);
      display:flex;align-items:center;justify-content:center;
      color:var(--ac);flex-shrink:0;
      overflow:hidden;
    }
    .vc-ico img{
      width:100%;height:100%;object-fit:cover;
    }
    .vc-nm{font-size:14px;font-weight:700;line-height:1.2}
    .vc-pl{font-size:12px;color:var(--sub);margin-top:3px;letter-spacing:.4px}
    
    .vc-mt{
      display:flex;
      flex-direction:column;
      gap:4px;
      font-size:12px;
      color:var(--sub);
      margin-bottom:11px;
    }
    .grade.ls .vc-mt {
      margin-bottom: 0;
      flex-direction: row;
      gap: 15px;
      flex: 1;
    }

    .vc-ft{
      display:flex;
      align-items:center;
      justify-content:space-between;
      margin-top: auto;
    }
    .grade.ls .vc-ft {
      margin-top: 0;
      width: 20%;
      justify-content: flex-end;
      gap: 15px;
    }
    .vc-ac{display:flex;gap:5px}

    /* KANBAN ESTRUTURA */
    .kanban-board {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
      align-items: start;
      height: calc(100vh - 150px);
      overflow-x: auto;
    }
    .kanban-col {
      background: var(--bg2);
      border: 1px solid var(--brd);
      border-radius: 14px;
      display: flex;
      flex-direction: column;
      max-height: 100%;
      overflow: hidden;
    }
    .kanban-col-h {
      padding: 12px 15px;
      border-bottom: 1px solid var(--brd);
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-weight: 700;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .kanban-col-c {
      background: rgba(255,179,0,0.1);
      color: var(--ac);
      border-radius: 20px;
      padding: 1px 8px;
      font-size: 11px;
    }
    .kanban-list {
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      overflow-y: auto;
      flex: 1;
    }
    .kb-card {
      background: var(--bg3);
      border: 1px solid var(--brd);
      border-radius: 10px;
      padding: 12px;
      cursor: pointer;
      transition: 0.15s;
    }
    .kb-card:hover {
      border-color: rgba(255,179,0,0.3);
    }
    .kb-card h4 {
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 4px;
    }
    .kb-card p {
      font-size: 11px;
      color: var(--sub);
      margin-bottom: 8px;
    }
    .kb-card-actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-top: 1px solid rgba(255,255,255,0.05);
      padding-top: 8px;
    }
    .kb-card-actions button {
      font-size: 11px;
      font-weight: 600;
      color: var(--ac);
      background: rgba(255,179,0,0.07);
      padding: 3px 8px;
      border-radius: 6px;
    }
    .kb-card-actions button:hover {
      background: rgba(255,179,0,0.15);
    }

    /* VENCIMENTOS */
    .vr{
      display:grid;
      grid-template-columns:1fr 130px 130px 175px;
      align-items:center;
      gap:14px;
      padding:13px 16px;
      background:var(--bg2);
      border:1px solid var(--brd);
      border-left:3px solid transparent;
      border-radius:var(--r);
      margin-bottom:8px;
      cursor:pointer;
      transition:.18s;
    }
    .vr:hover{background:var(--bg3)}
    .vr-nm{font-size:14px;font-weight:700}
    .vr-sb{font-size:12px;color:var(--sub);margin-top:2px}
    .vr-tp{font-size:13px;font-weight:600;color:var(--sub)}
    .vr-dt{font-size:13px;font-weight:600}
    .vr-ds{font-size:13px;font-weight:800;text-align:right}

    /* DOCS VIEW */
    .db{
      background:var(--bg2);
      border:1px solid var(--brd);
      border-radius:var(--r);
      margin-bottom:13px;
      overflow:hidden;
    }
    .db-h{
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:13px 15px;
      border-bottom:1px solid var(--brd);
      cursor:pointer;
      transition:.15s;
    }
    .db-h:hover{background:var(--bg3)}
    .dr{
      display:flex;
      align-items:center;
      gap:11px;
      padding:11px 15px;
      border-bottom:1px solid var(--brd);
      transition:.15s;
    }
    .dr:last-child{border-bottom:none}
    .dr:hover{background:var(--bg3)}
    .dr-ico{
      width:34px;height:34px;border-radius:8px;
      background:rgba(255,179,0,.07);
      border:1px solid rgba(255,179,0,.14);
      display:flex;align-items:center;justify-content:center;
      color:var(--ac);flex-shrink:0;
    }
    .dr-inf">.dr-inf{
      flex:1;min-width:0;
    }
    .dr-inf strong{
      display:block;
      font-size:13px;
      font-weight:600;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .dr-inf small{
      color:var(--sub);
      font-size:11px;
    }

    /* MODAL */
    .ov{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.72);
      backdrop-filter:blur(5px);
      z-index:200;
      display:flex;
      align-items:center;
      justify-content:center;
      opacity:0;
      pointer-events:none;
      transition:opacity .2s;
    }
    .ov.on{opacity:1;pointer-events:all}
    .modal{
      background:var(--bg2);
      border:1px solid var(--brd);
      border-radius:18px;
      width:92%;
      max-width:680px;
      max-height:90vh;
      display:flex;
      flex-direction:column;
      box-shadow:0 24px 64px rgba(0,0,0,.6);
      overflow:hidden;
    }
    .modal-h{
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:14px 16px;
      border-bottom:1px solid var(--brd);
    }
    .modal-h h2{
      font-family:'Montserrat',sans-serif;
      font-size:18px;
      font-weight:900;
      color:var(--ac);
    }
    .modal-b{
      padding:16px;
      overflow:auto;
    }
    .fgrid{
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:10px;
    }
    .fg{display:flex;flex-direction:column;gap:6px;margin-bottom:10px}
    .fg label{
      font-size:11px;
      color:var(--sub);
      text-transform:uppercase;
      letter-spacing:.5px;
      font-weight:700;
    }
    .fg input,.fg select,.fg textarea{
      padding:10px 11px;
      background:var(--bg3);
      border:1px solid var(--brd);
      border-radius:10px;
      color:var(--txt);
    }
    .fg textarea{resize:vertical;min-height:88px}
    .fsec{
      background:var(--bg3);
      border:1px solid var(--brd);
      border-radius:14px;
      padding:13px;
      margin-bottom:12px;
    }
    .fsec h3{
      font-size:12px;
      text-transform:uppercase;
      letter-spacing:.5px;
      color:var(--sub);
      margin-bottom:10px;
    }
    .modal-f{
      display:flex;
      justify-content:flex-end;
      gap:8px;
      padding:14px 16px;
      border-top:1px solid var(--brd);
      background:var(--bg2);
    }

    /* DETAIL */
    .det-g{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
    }
    .det-c{
      background:var(--bg3);
      border:1px solid var(--brd);
      border-radius:14px;
      padding:13px;
    }
    .det-c h3{
      font-size:12px;
      color:var(--sub);
      text-transform:uppercase;
      letter-spacing:.5px;
      margin-bottom:10px;
    }
    .det-i{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:8px 12px;
    }
    .det-i div{
      background:var(--bg2);
      border:1px solid var(--brd);
      border-radius:10px;
      padding:9px;
    }
    .det-i label{
      display:block;
      font-size:10px;
      color:var(--sub);
      text-transform:uppercase;
      margin-bottom:3px;
    }
    .det-i span{font-size:13px;font-weight:600}
    .doc-add{
      display:grid;
      grid-template-columns:1fr 1fr 1fr auto;
      gap:8px;
      align-items:end;
    }
    .doc-item{
      display:flex;
      align-items:center;
      gap:10px;
      padding:10px 0;
      border-top:1px solid var(--brd);
    }
    .doc-item:first-child{border-top:none}
    .doc-item .x{
      margin-left:auto;
    }

    /* EMPTY */
    .empty{
      background:var(--bg2);
      border:1px dashed var(--brd);
      border-radius:14px;
      padding:28px;
      text-align:center;
      color:var(--sub);
    }
    .empty h3{
      color:var(--txt);
      margin-top:8px;
      margin-bottom:6px;
    }

    /* TOAST */
    #toasts{
      position:fixed;
      right:14px;
      bottom:14px;
      z-index:500;
      display:flex;
      flex-direction:column;
      gap:8px;
    }
    .toast{
      background:rgba(17,17,17,.96);
      border:1px solid var(--brd);
      border-left:3px solid var(--ac);
      padding:10px 12px;
      border-radius:10px;
      min-width:240px;
      box-shadow:0 14px 30px rgba(0,0,0,.3);
      color:var(--txt);
      font-size:13px;
    }
    .toast.err{border-left-color:var(--err)}
    .toast.ok{border-left-color:var(--ok)}
    .toast.warn{border-left-color:var(--warn)}

    @keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

    @media (max-width: 1200px){
      .stats-g{grid-template-columns:repeat(2,1fr)}
      .fgrid,.det-g,.doc-add{grid-template-columns:1fr}
      .vr{grid-template-columns:1fr 120px}
      .vr-dt,.vr-ds{display:none}
      .kanban-board { grid-template-columns: 1fr; height: auto; }
    }
  </style>
</head>

  <script>
  (() => {
    'use strict';

    const KEY = 'mer_seminovos_db_v1';

    const $ = s => document.querySelector(s);
    const $$ = s => [...document.querySelectorAll(s)];
    const uid = () => (crypto?.randomUUID ? crypto.randomUUID() : 'id-' + Date.now() + '-' + Math.random().toString(16).slice(2));
    
    const esc = s => String(s ?? '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');

    const norm = s => String(s ?? '')
      .toLowerCase()
      .trim()
      .normalize('NFD').replace(/[\u0300-\u036f]/g, '');

    let db = [];
    let view = 'dashboard';
    let search = '';
    let listMode = false;
    let editId = null;
    let detailId = null;

    const dateFields = [
      {k:'ipva',l:'IPVA'},
      {k:'licenciamento',l:'Licenciamento'},
      {k:'seguro',l:'Seguro'},
      {k:'cnh',l:'CNH'},
      {k:'revisao',l:'Revisão'},
      {k:'vistoria',l:'Vistoria'}
    ];

    function saveDB(){ localStorage.setItem(KEY, JSON.stringify(db)); }
    function loadDB(){
      try { return JSON.parse(localStorage.getItem(KEY) || '[]'); }
      catch { return []; }
    }

    function toast(msg, type='ok'){
      const el = document.createElement('div');
      el.className = `toast ${type}`;
      el.textContent = msg;
      $('#toasts').appendChild(el);
      setTimeout(() => el.remove(), 3000);
    }

    function fmtDate(d){
      if (!d) return '—';
      const x = new Date(d + 'T00:00:00');
      return isNaN(x) ? '—' : x.toLocaleDateString('pt-BR');
    }

    function fmtBytes(bytes) {
      if (!bytes) return '0 B';
      const k = 1024;
      const sizes = ['B', 'KB', 'MB'];
      const i = Math.floor(Math.log(bytes) / Math.log(k));
      return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
    }

    function daysLeft(d){
      if (!d) return null;
      const a = new Date();
      a.setHours(0,0,0,0);
      const b = new Date(d + 'T00:00:00');
      return Math.ceil((b - a) / 86400000);
    }

    function dayColor(n){ return n < 0 ? '#ef4444' : n <= 15 ? '#f59e0b' : '#22c55e'; }
    function dayText(n){ return n < 0 ? `Vencido há ${Math.abs(n)}d` : n === 0 ? 'Vence hoje' : `${n}d restantes`; }
    function statusClass(s){ return s === 'Pendente' ? 'stP' : s === 'Vencido' ? 'stV' : 'stR'; }

    function carIcon(size=20){
      return `<svg width="${size}" height="${size}" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path d="M5 17H3a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11a2 2 0 0 1 2 2v3"/>
        <rect x="9" y="11" width="14" height="10" rx="2"/>
        <circle cx="12" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
      </svg>`;
    }
    function editIcon(){
      return `<svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
        <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
      </svg>`;
    }
    function trashIcon(){
      return `<svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <polyline points="3 6 5 6 21 6"/>
        <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
        <path d="M10 11v6M14 11v6"/>
        <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
      </svg>`;
    }
    function docIcon(size=20){
      return `<svg width="${size}" height="${size}" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
        <polyline points="14,2 14,8 20,8"/>
      </svg>`;
    }

    function renderView(v){
      view = v;
      $$('.view').forEach(el => el.classList.remove('on'));
      $(`#view-${v}`).classList.add('on');
      $$('.nb').forEach(b => b.classList.toggle('on', b.dataset.view === v));

      const titles = {dashboard:'Dashboard', veiculos:'Estoque / Veículos', vencimentos:'Vencimentos', documentos:'Documentos', kanban:'Kanban de Transferência'};
      $('#pgTitle').textContent = titles[v] || v;

      if (v === 'dashboard') renderDashboard();
      if (v === 'veiculos') { renderVeiculos(); checkLoteButton(); }
      if (v === 'kanban') renderKanban();
      if (v === 'vencimentos') renderVencimentos();
      if (v === 'documentos') renderDocumentos();
    }

    function renderDashboard(){
      const stats = [
        {l:'Total', v:db.length, c:'#ffb300'},
        {l:'Regulares', v:db.filter(x => x.status === 'Regular').length, c:'#22c55e'},
        {l:'Pendentes', v:db.filter(x => x.status === 'Pendente').length, c:'#f59e0b'},
        {l:'Vencidos', v:db.filter(x => x.status === 'Vencido').length, c:'#ef4444'},
        {l:'Documentos', v:db.reduce((a,x) => a + (x.documentos || []).length, 0), c:'#ff7a18'}
      ];

      $('#statsGrid').innerHTML = stats.map((s,i) => `
        <div class="sc" style="animation-delay:${i * .04}s;border-top-color:${s.c}">
          <div class="sc-v" style="color:${s.c}">${s.v}</div>
          <div class="sc-l">${s.l}</div>
        </div>
      `).join('');

      const alerts = [];
      db.forEach(v => {
        dateFields.forEach(f => {
          const d = daysLeft(v[f.k]);
          if (d !== null && d <= 60) alerts.push({id:v.id, nome:v.apelido || v.placa || 'Sem nome', tipo:f.l, d, data:v[f.k]});
        });
      });
      alerts.sort((a,b) => a.d - b.d);
      $('#countAlertas').textContent = String(alerts.length);

      $('#alertasVencimento').innerHTML = alerts.length ? alerts.slice(0,7).map(a => {
        const c = dayColor(a.d);
        return `
          <div class="ai" data-id="${a.id}">
            <div class="ai-d" style="background:${c}"></div>
            <div class="ai-inf">
              <strong>${esc(a.nome)}</strong>
              <small>${esc(a.tipo)} — ${fmtDate(a.data)}</small>
            </div>
            <span class="ai-tg" style="background:${c}22;color:${c}">${dayText(a.d)}</span>
          </div>
        `;
      }).join('') : `
        <div class="empty" style="margin:12px">
          <h3>Nenhum vencimento próximo</h3>
          <p>Sem datas nos próximos 60 dias.</p>
        </div>
      `;

      const sorted = db.slice().sort((a,b) => new Date(b.criadoEm) - new Date(a.criadoEm));
      $('#ultimosCadastros').innerHTML = sorted.length ? sorted.slice(0,6).map(v => {
        const sub = [v.marca, v.modelo, v.ano].filter(Boolean).join(' ') + (v.placa ? ` — ${v.placa}` : '');
        const pf = (v.documentos || []).find(d => d.tipo === 'Foto' || d.url.startsWith('http'));
        const thumb = pf ? `<img src="${pf.url}">` : carIcon(15);
        return `
          <div class="ai" data-id="${v.id}">
            <div class="ai-ico">${thumb}</div>
            <div class="ai-inf">
              <strong>${esc(v.apelido || 'Sem nome')}</strong>
              <small>${esc(sub || '—')}</small>
            </div>
            <span class="st ${statusClass(v.status)}">${esc(v.status || 'Regular')}</span>
          </div>
        `;
      }).join('') : `
        <div class="empty" style="margin:12px">
          <h3>Nenhum veículo cadastrado</h3>
          <p>Use o botão “Novo Veículo”.</p>
        </div>
      `;
    }

    function renderVeiculos(){
      const tipo = $('#filtroTipo').value;
      const status = $('#filtroStatus').value;

      const lista = db.filter(v => {
        const q = !search ||

    function renderKanban() {
      const colunas = { entrada: [], vistoria: [], andamento: [], concluido: [] };
      
      db.forEach(v => {
        const fase = v.faseKanban || 'entrada';
        if (colunas[fase]) colunas[fase].push(v);
      });

      Object.keys(colunas).forEach(fase => {
        $(`#count-${fase}`).textContent = colunas[fase].length;
        const listEl = $(`#list-${fase}`);
        
        if (!colunas[fase].length) {
          listEl.innerHTML = `<div style="font-size:11px; color:var(--mut); text-align:center; padding:20px 0;">Nenhum carro nesta fase</div>`;
          return;
        }

        listEl.innerHTML = colunas[fase].map(v => {
          let botoesFluxo = '';
          if (fase === 'entrada') botoesFluxo = `<button data-move="vistoria" data-id="${v.id}">Avançar ›</button>`;
          if (fase === 'vistoria') botoesFluxo = `<button data-move="entrada" data-id="${v.id}">‹ Voltar</button><button data-move="andamento" data-id="${v.id}">Avançar ›</button>`;

          if (fase === 'concluido') botoesFluxo = `<button data-move="andamento" data-id="${v.id}">‹ Reabrir</button>`;

          const primeiraFoto = (v.documentos || []).find(d => d.tipo === 'Foto' || d.url.startsWith('http'));
          const tagFotoHtml = primeiraFoto ? `<img src="${primeiraFoto.url}" style="width:100%; height:85px; object-fit:cover; border-radius:6px; margin-bottom:8px; background:#000;">` : '';

          return `

          `;
        }).join('');
      });

    function parseBoomXml(xmlString) {
      try {
        const parser = new DOMParser();
        const xmlDoc = parser.parseFromString(xmlString, "text/xml");
        let veiculosTags = xmlDoc.getElementsByTagName("veiculo");

        if (!veiculosTags.length) veiculosTags = xmlDoc.getElementsByTagName("item");

        if (!veiculosTags.length) { toast('Nenhum veículo mapeado neste arquivo XML', 'warn'); return; }

        const novosVeiculos = [];

        for (let i = 0; i < veiculosTags.length; i++) {
          const vNode = veiculosTags[i];
          const read = tag => {
            const el = vNode.getElementsByTagName(tag)[0];
            return el && el.textContent ? el.textContent.trim() : '';
          };

          const fotosArray = [];
          const midiasContainer = vNode.getElementsByTagName("midias")[0];
          if (midiasContainer) {
            const fotosLinks = midiasContainer.getElementsByTagName("foto");
            for (let j = 0; j < fotosLinks.length; j++) {
              if (fotosLinks[j] && fotosLinks[j].textContent) {
                fotosArray.push({ nome: `Foto ${j + 1}`, tipo: 'Foto', url: fotosLinks[j].textContent.trim() });
              }
            }
          }

          const marca = read('marca');
          const modelo = read('modelo');
          let versao = read('versao') || read('submodelo') || (read('motorizacao') ? read('motorizacao') + ' ' + read('cambio') : '');
          const nomeCarro = versao ? `${modelo} ${versao}` : modelo || 'Veículo Sem Nome';

          novosVeiculos.push({
            id: uid(),
            criadoEm: new Date().toISOString(),
            atualizadoEm: new Date().toISOString(),
            documentos: fotosArray,
            apelido: nomeCarro,
            placa: read('placa'),
            tipo: read('tipo') || 'Carro',
            status: 'Regular',
            marca: marca,
            modelo: modelo,
            ano: read('ano_fabricacao') || read('ano_modelo'),
            cor: read('cor'),
            renavam: read('renavam'),
            chassi: read('chassi'),
            proprietario: 'Estoque Central',
            faseKanban: 'entrada',
            obs: [read('observacao'), read('opcionais')].filter(Boolean).join('\n')
          });
        }

        const placasExistentes = db.map(x => norm(x.placa)).filter(Boolean);
        const filtrados = novosVeiculos.filter(x => !placasExistentes.includes(norm(x.placa)));

        if (!filtrados.length) { toast('Nenhum veículo novo para carregar', 'warn'); return; }

        db = [...filtrados, ...db];
        saveDB(); renderView(view);
        toast(`${filtrados.length} carros injetados no estoque com sucesso!`, 'ok');
      } catch { toast('Falha crônica ao ler tags do XML', 'err'); }
    }

        obs: $('#fObs').value.trim(),
        ipva: $('#fIpva').value,
        licenciamento: $('#fLicenciamento').value,
        seguro: $('#fSeguro').value,
        cnh: $('#fCnh').value,
        revisao: $('#fRevisao').value,
        vistoria: $('#fVistoria').value
      };

      if (!data.apelido || !data.placa || !data.tipo){
        toast('Preencha Apelido, Placa e Tipo', 'warn');
        return;
      }

      const idx = db.findIndex(x => x.id === data.id);
      if (idx >= 0){
        db[idx] = { ...db[idx], ...data, atualizadoEm: new Date().toISOString(), documentos: db[idx].documentos || [] };
      } else {
        db.unshift({ ...data, criadoEm: new Date().toISOString(), atualizadoEm: new Date().toISOString(), documentos: [] });
      }

      saveDB();
      closeModal();
      renderView(view);
      toast('Veículo salvo com sucesso', 'ok');
    }

    function deleteVehicle(id){
      const v = db.find(x => x.id === id);
      if (!v) return;
      if (!confirm(`Excluir "${v.apelido || v.placa || 'veículo'}"?`)) return;
      db = db.filter(x => x.id !== id);
      saveDB();
      if (detailId === id) closeDetail();
      renderView(view);
      toast('Veículo excluído', 'ok');
    }

    function nextDue(v){
      let best = null;
      dateFields.forEach(f => {
        if (!v[f.k]) return;
        const d = daysLeft(v[f.k]);
        if (d === null) return;
        if (!best || d < best.d) best = {l:f.l, d, c:dayColor(d), t:dayText(d)};
      });
      return best;
    }

    db = loadDB();
    renderView('dashboard');

  })();
  </script>
</body>
</html>
