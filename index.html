<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <title>MeR Seminovos | CRM Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="logo">MeR Seminovos CRM</div>
        <nav>
            <button class="nav-btn" onclick="view('cadastro')">Novo Veículo</button>
            <button class="nav-btn" onclick="view('estoque')">Estoque</button>
            <button class="nav-btn" onclick="backup()">Backup</button>
        </nav>
    </header>

    <main id="app">
        <div id="cadastro" class="view">
            <div class="card">
                <h2>Dados do Veículo</h2>
                <input type="hidden" id="editIndex" value="-1">
                <input type="text" id="modelo" placeholder="Modelo">
                <input type="text" id="placa" placeholder="Placa">
                <button class="btn-main" onclick="salvar()">Salvar Cadastro</button>
            </div>
        </div>
        <div id="estoque" class="view" style="display:none;">
            <div class="grid" id="lista"></div>
        </div>
    </main>
    <script src="script.js"></script>
</body>
</html>
