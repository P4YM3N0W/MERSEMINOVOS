<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>MeR Seminovos | Enterprise CRM</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        /* CSS FUTURISTA */
        body { margin: 0; background: #000; color: #fff; font-family: 'Inter', sans-serif; }
        .sidebar { width: 250px; height: 100vh; background: #0a0a0a; border-right: 1px solid #222; }
        .dashboard { padding: 40px; }
        .card-sql { background: #111; border: 1px solid #333; padding: 20px; border-radius: 12px; }
    </style>
</head>
<body>
    <div class="sidebar">
        <button id="btnSync">Sincronizar SQL</button>
    </div>
    <div class="dashboard">
        <div class="card-sql">
            <h2>Gestão de Estoque SQL</h2>
            <div id="gridVeiculos"></div>
        </div>
    </div>

    <script>
        // Esta função se conectará ao seu servidor Node.js/SQL
        async function syncSQL() {
            try {
                const response = await fetch('http://localhost:3000/veiculos');
                const data = await response.json();
                console.log("Dados puxados do SQL:", data);
            } catch (err) {
                alert("Servidor SQL offline. Verifique o Node.js");
            }
        }
        document.getElementById('btnSync').onclick = syncSQL;
    </script>
</body>
</html>
