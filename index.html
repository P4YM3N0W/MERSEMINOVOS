<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <title>MeR Seminovos | CRM Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<aside>
    <img src="LOGOTIPO.png" onerror="this.style.display='none'">
    <div class="nav" onclick="view('cadastro')">➕ Novo Cadastro</div>
    <div class="nav" onclick="view('estoque')">📦 Estoque</div>
</aside>

<main>
    <div id="cadastro" class="view">
        <h1>Novo Veículo</h1>
        <div class="form-container">
            <input type="text" id="mModelo" placeholder="Modelo">
            <input type="text" id="mPlaca" placeholder="Placa">
            <select id="mIpva"><option value="Pago">IPVA Pago</option><option value="Atrasado">IPVA Atrasado</option></select>
            <input type="number" id="mValor" placeholder="Valor Pendência (R$)">
            <button onclick="salvar()">Gravar Veículo</button>
        </div>
    </div>
    <div id="estoque" class="view" style="display:none;">
        <h1>Estoque</h1>
        <div class="grid" id="lista"></div>
    </div>
</main>

<script src="script.js"></script>
</body>
</html>
