<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MeR Seminovos CRM</title>
    <style>
        /* RESET E VARIÁVEIS */
        :root { --bg:#050505; --surface:#111; --accent:#ffb300; --text:#fff; --border:#333; }
        body { margin: 0; font-family: sans-serif; background: var(--bg); color: var(--text); display: flex; }
        
        /* SIDEBAR */
        nav { width: 250px; background: #000; border-right: 1px solid var(--border); height: 100vh; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        nav img { width: 100%; margin-bottom: 20px; }
        .nav-btn { background: #222; color: #fff; border: 1px solid var(--border); padding: 12px; border-radius: 6px; cursor: pointer; text-align: left; }
        .nav-btn:hover { background: var(--accent); color: #000; }

        /* PAINEL */
        main { flex: 1; padding: 40px; overflow-y: auto; }
        .card { background: var(--surface); padding: 20px; border-radius: 10px; border: 1px solid var(--border); margin-bottom: 20px; }
        input { width: 100%; padding: 10px; margin: 10px 0; background: #000; border: 1px solid var(--border); color: #fff; border-radius: 4px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
    </style>
</head>
<body>

<nav>
    <img src="LOGOTIPO.png" onerror="this.style.display='none'">
    <button class="nav-btn" onclick="show('cadastro')">+ Cadastrar Veículo</button>
    <button class="nav-btn" onclick="show('estoque')">Visualizar Estoque</button>
    <button class="nav-btn" onclick="exportarBackup()">Backup JSON</button>
</nav>

<main>
    <div id="cadastro" class="view">
        <div class="card">
            <h1>Cadastro de Veículo</h1>
            <input type="text" id="mModelo" placeholder="Modelo">
            <input type="text" id="mPlaca" placeholder="Placa">
            <button class="nav-btn" onclick="salvar()">Salvar no Pátio</button>
        </div>
    </div>
    <div id="estoque" class="view" style="display:none;">
        <h1>Estoques</h1>
        <div class="grid" id="lista"></div>
    </div>
</main>

<script>
    let db = JSON.parse(localStorage.getItem('crm_data') || '[]');

    function show(id) {
        document.querySelectorAll('.view').forEach(v => v.style.display = 'none');
        document.getElementById(id).style.display = 'block';
        if(id === 'estoque') render();
    }

    function salvar() {
        const v = {
            id: Date.now(),
            modelo: document.getElementById('mModelo').value,
            placa: document.getElementById('mPlaca').value
        };
        db.push(v);
        localStorage.setItem('crm_data', JSON.stringify(db));
        alert('Cadastro realizado!');
        location.reload();
    }

    function render() {
        document.getElementById('lista').innerHTML = db.map(v => 
            `<div class="card"><strong>${v.modelo}</strong><br>Placa: ${v.placa}</div>`
        ).join('');
    }

    function exportarBackup() {
        const a = document.createElement('a');
        a.href = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(db));
        a.download = "backup.json";
        a.click();
    }
</script>
</body>
</html>
