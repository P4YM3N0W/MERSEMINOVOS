<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>MeR Seminovos CRM 🚀</title>
    <style>
        :root { --bg: #0a0a0a; --surface: #171717; --primary: #fbbf24; --text: #e5e5e5; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; display: flex; }
        
        /* Sidebar Minimalista */
        aside { width: 260px; height: 100vh; background: #000; padding: 20px; border-right: 1px solid #333; }
        .logo { font-size: 20px; font-weight: bold; margin-bottom: 40px; color: var(--primary); }
        .nav-link { display: block; padding: 12px; margin-bottom: 10px; cursor: pointer; border-radius: 8px; transition: 0.3s; }
        .nav-link:hover { background: var(--surface); }

        /* Main Content */
        main { flex: 1; padding: 40px; }
        .card { background: var(--surface); padding: 20px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #333; }
        input, button { padding: 10px; border-radius: 6px; border: 1px solid #444; background: #000; color: #fff; margin: 5px 0; }
        button { background: var(--primary); color: #000; font-weight: bold; cursor: pointer; border: none; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
    </style>
</head>
<body>

<aside>
    <div class="logo">MeR Seminovos 🏎️</div>
    <div class="nav-link" onclick="showView('cadastro')">➕ Novo Cadastro</div>
    <div class="nav-link" onclick="showView('estoque')">📦 Estoque</div>
    <div class="nav-link" onclick="triggerImport()">📥 Importar XML</div>
    <input type="file" id="xmlInput" hidden accept=".xml">
</aside>

<main>
    <div id="cadastro" class="view">
        <div class="card">
            <h2>Novo Veículo ✍️</h2>
            <input type="text" id="modelo" placeholder="Modelo">
            <input type="text" id="placa" placeholder="Placa">
            <button onclick="salvar()">Cadastrar</button>
        </div>
    </div>

    <div id="estoque" class="view" style="display:none;">
        <h1>Estoque Atual 📋</h1>
        <div class="grid" id="lista"></div>
    </div>
</main>

<script>
    let db = JSON.parse(localStorage.getItem('mer_db') || '[]');

    function showView(id) {
        document.querySelectorAll('.view').forEach(v => v.style.display = 'none');
        document.getElementById(id).style.display = 'block';
        if(id === 'estoque') render();
    }

    function salvar() {
        db.push({ modelo: document.getElementById('modelo').value, placa: document.getElementById('placa').value });
        localStorage.setItem('mer_db', JSON.stringify(db));
        alert('Cadastrado! ✅');
        location.reload();
    }

    function render() {
        const div = document.getElementById('lista');
        div.innerHTML = db.map((v, i) => `
            <div class="card">
                <h3>${v.modelo}</h3>
                <p>Placa: ${v.placa}</p>
                <button onclick="editar(${i})">Editar ✏️</button>
            </div>
        `).join('');
    }

    function triggerImport() { document.getElementById('xmlInput').click(); }

    document.getElementById('xmlInput').onchange = (e) => {
        const reader = new FileReader();
        reader.onload = (evt) => {
            const xml = new DOMParser().parseFromString(evt.target.result, "text/xml");
            const veiculos = xml.getElementsByTagName("veiculo");
            for(let v of veiculos) {
                db.push({ 
                    modelo: v.getElementsByTagName("modelo")[0].textContent,
                    placa: v.getElementsByTagName("placa")[0].textContent 
                });
            }
            localStorage.setItem('mer_db', JSON.stringify(db));
            alert('XML Importado com sucesso! 📤');
            location.reload();
        };
        reader.readAsText(e.target.files[0]);
    };
</script>
</body>
</html>
