<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>MeR Seminovos | CRM Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="logo">MeR Seminovos CRM</div>
        <nav>
            <button class="nav-btn" onclick="view('cadastro')">➕ Novo Cadastro</button>
            <button class="nav-btn" onclick="view('estoque')">📦 Estoque</button>
            <button class="nav-btn" onclick="exportarBackup()">💾 Backup/Exportar</button>
            <button class="nav-btn" onclick="document.getElementById('fileInput').click()">📥 Importar</button>
            <input type="file" id="fileInput" hidden onchange="importar(event)">
        </nav>
    </header>

    <main>
        <div id="cadastro" class="view">
            <div class="card">
                <h2>Veículo</h2>
                <input type="hidden" id="editIndex" value="-1">
                <input type="text" id="mModelo" placeholder="Modelo">
                <input type="text" id="mPlaca" placeholder="Placa (Chave)">
                <input type="text" id="mChassi" placeholder="Chassi">
                <input type="text" id="mRenavam" placeholder="Renavam">
                <input type="text" id="mTelAtual" placeholder="Tel. Dono Atual">
                <input type="text" id="mTelAnterior" placeholder="Tel. Ex-Dono">
                <select id="mIpva"><option value="Pago">IPVA Pago</option><option value="Atrasado">IPVA Atrasado</option></select>
                <select id="mMulta"><option value="Sem">Sem Multas</option><option value="Pendente">Multa Pendente</option></select>
                <input type="number" id="mValor" placeholder="Valor Pendência (R$)">
                <button class="btn-main" onclick="salvar()">Salvar Veículo</button>
            </div>
        </div>
        <div id="estoque" class="view" style="display:none;">
            <div class="grid" id="lista"></div>
        </div>
    </main>
    <script src="script.js"></script>
</body>
</html>
